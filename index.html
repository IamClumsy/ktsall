<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTS Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }
    a.card {
      display: block;
      width: 100%;
      max-width: 480px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      color: #fff;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    a.card:hover {
      background: #222;
      border-color: #444;
      transform: translateY(-2px);
    }
    a.card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 0.4rem;
    }
    a.card .title {
      font-size: 1.15rem;
      font-weight: 600;
    }
    a.card .url {
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <h1>KTS Tools</h1>

  <a class="card" href="https://kts.guide" target="_blank" rel="noopener">
    <div class="label">Artist Info</div>
    <div class="title">Artist Info</div>
    <div class="url">kts.guide</div>
  </a>

  <a class="card" href="https://kts.guru" target="_blank" rel="noopener">
    <div class="label">Resources Needed Calculator</div>
    <div class="title">Resources Needed Calculator</div>
    <div class="url">kts.guru</div>
  </a>

  <a class="card" href="https://kts.quest" target="_blank" rel="noopener">
    <div class="label">Event Calculators</div>
    <div class="title">Event Calculators</div>
    <div class="url">kts.quest</div>
  </a>

  <a class="card" href="https://kts.life" target="_blank" rel="noopener">
    <div class="label">SVS Store Calculator</div>
    <div class="title">SVS Store Calculator</div>
    <div class="url">kts.life</div>
  </a>
</body>
</html>
